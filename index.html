<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SplitTab</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0e0e0f;
    --surface: #181819;
    --surface2: #222224;
    --surface3: #2a2a2d;
    --border: #2f2f33;
    --gold: #e8b84b;
    --gold-dim: #b8902e;
    --gold-glow: rgba(232,184,75,0.15);
    --text: #f0ede8;
    --text-dim: #8a8680;
    --text-muted: #4a4845;
    --danger: #e05c5c;
    --green: #5ce09e;
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 9999; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.35;
  }

  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  header {
    padding: 20px 20px 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--gold); letter-spacing: -0.5px; }
  .logo span { font-style: italic; color: var(--text-dim); font-size: 22px; }
  .step-indicator { display: flex; gap: 5px; align-items: center; }
  .step-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: all 0.3s; }
  .step-dot.active { background: var(--gold); width: 18px; border-radius: 3px; }
  .step-dot.done { background: var(--gold-dim); }

  /* Screens */
  .screen { display: none; flex-direction: column; flex: 1; padding: 20px; animation: fadeUp 0.35s ease; }
  .screen.active { display: flex; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  h2 { font-family: 'DM Serif Display', serif; font-size: 28px; line-height: 1.2; margin-bottom: 6px; }
  h2 em { font-style: italic; color: var(--gold); }
  .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; }

  /* Upload Zone */
  .preview-zone {
    border: 1.5px dashed var(--border); border-radius: var(--radius);
    background: var(--surface); padding: 20px; text-align: center;
    margin-bottom: 16px; display: none;
  }
  .preview-zone.has-image { display: block; }
  .preview-img { max-width: 100%; max-height: 200px; border-radius: var(--radius-sm); object-fit: contain; margin-bottom: 8px; }
  .preview-filename { color: var(--text-dim); font-size: 12px; }

  .upload-btn-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .upload-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; padding: 22px 12px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); cursor: pointer; transition: all 0.2s;
    color: var(--text-dim); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    position: relative; overflow: hidden;
  }
  .upload-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-glow); }
  .upload-btn input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-btn-icon { font-size: 28px; }

  /* Divider */
  .or-divider { display: flex; align-items: center; gap: 12px; color: var(--text-muted); font-size: 12px; margin: 8px 0 20px; }
  .or-divider::before, .or-divider::after { content:''; flex:1; height:1px; background: var(--border); }

  /* Buttons */
  .btn {
    width: 100%; padding: 15px; border-radius: var(--radius-sm); border: none;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.2px;
  }
  .btn-gold { background: var(--gold); color: #1a1500; }
  .btn-gold:hover { background: #f0c958; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(232,184,75,0.25); }
  .btn-gold:active { transform: translateY(0); }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface3); }
  .btn-sm { padding: 8px 14px; width: auto; font-size: 13px; border-radius: 8px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* Loading */
  .loading-state { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 40px 0; }
  .spinner { width: 40px; height: 40px; border: 2.5px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state p { color: var(--text-dim); font-size: 14px; }

  /* People */
  .people-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .person-tag {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px;
    animation: fadeUp 0.2s ease;
  }
  .person-color { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
  .person-name { font-weight: 500; flex: 1; }
  .person-remove { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; padding: 0 4px; transition: color 0.2s; }
  .person-remove:hover { color: var(--danger); }
  .add-person-row { display: flex; gap: 8px; }
  .input-field {
    flex: 1; background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); padding: 13px 14px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none;
    transition: border-color 0.2s;
  }
  .input-field:focus { border-color: var(--gold); }
  .input-field::placeholder { color: var(--text-muted); }

  /* Items */
  .items-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; overflow-y: auto; max-height: calc(100vh - 320px); }
  .item-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 14px;
    transition: border-color 0.2s;
  }
  .item-card.fully-assigned { border-color: rgba(92,224,158,0.3); }
  .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .item-name { font-weight: 600; font-size: 15px; flex: 1; margin-right: 8px; }
  .item-price { color: var(--gold); font-weight: 600; font-size: 16px; white-space: nowrap; }
  .item-actions-row { display: flex; align-items: center; gap: 6px; justify-content: space-between; }
  .item-remove-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 2px; transition: color 0.2s; }
  .item-remove-btn:hover { color: var(--danger); }
  .assign-chips { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
  .chip {
    padding: 5px 11px; border-radius: 20px; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; border: 1.5px solid transparent;
    background: var(--surface2); color: var(--text-dim);
  }
  .chip.selected { color: #111; font-weight: 600; }
  .chip:hover { opacity: 0.85; }
  .unassigned-badge { font-size: 11px; color: var(--text-muted); font-style: italic; }
  .assigned-count { font-size: 11px; color: var(--green); }

  /* Add item manual */
  .add-item-form { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .add-item-form h4 { font-size: 13px; font-weight: 600; color: var(--text-dim); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .add-item-row { display: flex; gap: 8px; }
  .input-field-sm { background: var(--surface3); border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; width: 100%; }
  .input-field-sm:focus { border-color: var(--gold); }
  .input-field-sm::placeholder { color: var(--text-muted); }
  .input-field-sm.price-input { width: 90px; flex-shrink: 0; }

  /* Totals edit */
  .totals-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .total-field { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .total-field label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

  /* Summary */
  .summary-cards { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .summary-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .summary-card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .summary-person { display: flex; align-items: center; gap: 10px; }
  .summary-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .summary-name { font-weight: 600; font-size: 16px; }
  .summary-total { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--gold); }
  .summary-items { padding: 10px 16px; display: flex; flex-direction: column; gap: 6px; }
  .summary-item-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-dim); }
  .summary-item-row.fee { color: var(--text-muted); }
  .summary-divider { height: 1px; background: var(--border); margin: 4px 0; }

  /* Grand total */
  .grand-total-bar {
    background: linear-gradient(135deg, var(--surface2), var(--surface3));
    border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
  }
  .grand-total-label { color: var(--text-dim); font-size: 14px; }
  .grand-total-amount { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--gold); }

  .warning-bar { background: rgba(224,92,92,0.1); border: 1px solid rgba(224,92,92,0.3); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; color: var(--danger); margin-bottom: 12px; }

  /* Bottom nav spacer */
  .spacer { flex: 1; }
  .bottom-actions { padding: 12px 0 0; display: flex; gap: 8px; }
  .bottom-actions .btn { flex: 1; }

  /* Toggle add item */
  .toggle-add-btn { background: none; border: 1.5px dashed var(--border); border-radius: var(--radius-sm); padding: 10px; width: 100%; color: var(--text-muted); font-size: 13px; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; font-family: 'DM Sans', sans-serif; }
  .toggle-add-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* Tabs */
  .tab-btn { flex:1; padding:9px; border:none; border-radius:8px; background:transparent; color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s; }
  .tab-btn.active { background:var(--surface3); color:var(--text); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>

</head>

<script>
const COLORS = ['#e8b84b','#5ce09e','#5c9be0','#e05ce0','#e0845c','#5ce0d4','#c45ce0','#e05c7a'];
let state = {
  storedFile: null,
  items: [],
  people: [],
  tax: 0,
  tip: 0,
};

// ---- Navigation ----
function goTo(n) {
  document.querySelectorAll('.screen').forEach((s,i) => s.classList.toggle('active', i===n));
  document.querySelectorAll('.step-dot').forEach((d,i) => {
    d.classList.toggle('active', i===n);
    d.classList.toggle('done', i<n);
  });
  if (n===2) renderItems();
  if (n===3) renderSummary();
}

// ---- Screen 0 ----
function switchTab(tab) {
  document.getElementById('panelPhoto').style.display = tab === 'photo' ? 'block' : 'none';
  document.getElementById('panelText').style.display  = tab === 'text'  ? 'block' : 'none';
  document.getElementById('tabPhoto').classList.toggle('active', tab === 'photo');
  document.getElementById('tabText').classList.toggle('active', tab === 'text');
}

// Photo tab
document.getElementById('photoInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  state.storedFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('previewImg').src = ev.target.result;
    document.getElementById('previewFilename').textContent = file.name;
    document.getElementById('previewZone').style.display = 'block';
    document.getElementById('scanBtn').disabled = false;
  };
  reader.readAsDataURL(file);
});

document.getElementById('scanBtn').addEventListener('click', async () => {
  const errorDiv = document.getElementById('scanError');
  const statusDiv = document.getElementById('scanStatus');
  errorDiv.style.display = 'none';
  statusDiv.style.display = 'block';
  statusDiv.textContent = 'Reading receipt…';
  document.getElementById('scanBtn').disabled = true;
  document.getElementById('scanBtn').textContent = 'Scanning…';

  try {
    const file = state.storedFile;
    const base64 = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result.split(',')[1]);
      r.onerror = () => rej(new Error('Could not read file'));
      r.readAsDataURL(file);
    });

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: file.type || 'image/jpeg', data: base64 } },
            { type: 'text', text: `Parse this receipt image. Return ONLY a JSON object, no markdown, no explanation.
Format: {"items":[{"name":"string","price":number}],"tax":number,"tip":number}
- Combine each dish with its add-ons/modifiers into one item, summing their prices
- price/tax/tip are dollar amounts as plain numbers
- Skip subtotal, total, balance, payment method lines
- Use 0 for tax or tip if not shown` }
          ]
        }]
      })
    });

    if (!resp.ok) {
      const t = await resp.text().catch(() => '');
      throw new Error(`API error ${resp.status}: ${t.slice(0,100)}`);
    }
    const data = await resp.json();
    const raw = (data.content || []).filter(c => c.type === 'text').map(c => c.text).join('').trim();
    const clean = raw.replace(/^```[a-z]*\n?/i,'').replace(/```$/,'').trim();
    const parsed = JSON.parse(clean);
    applyReceiptData(parsed);
    goTo(1);

  } catch(err) {
    errorDiv.textContent = '⚠️ ' + err.message;
    errorDiv.style.display = 'block';
    document.getElementById('scanBtn').disabled = false;
    document.getElementById('scanBtn').textContent = 'Scan Receipt';
  } finally {
    statusDiv.style.display = 'none';
  }
});

// Text tab
document.getElementById('parseBtn').addEventListener('click', () => {
  const errorDiv = document.getElementById('parseError');
  errorDiv.style.display = 'none';
  const text = document.getElementById('receiptText').value.trim();
  if (!text) {
    errorDiv.textContent = '⚠️ Paste some receipt text first.';
    errorDiv.style.display = 'block';
    return;
  }
  const result = parseReceiptText(text);
  if (result.items.length === 0) {
    errorDiv.textContent = '⚠️ No items found. Each line needs a name and a price, e.g. "Burger 12.50".';
    errorDiv.style.display = 'block';
    return;
  }
  applyReceiptData(result);
  goTo(1);
});

document.getElementById('skipScanBtn').addEventListener('click', () => {
  state.items = [];
  goTo(1);
});

function parseReceiptText(raw) {
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const items = [];
  let tax = 0, tip = 0;

  const priceRe = /\$?\s*\+?\s*(\d{1,4}[.,]\d{2})\s*$/;
  const skipRe = /subtotal|sub-total|sub total|total|balance|amount due|change|cash|credit|card|visa|master|amex|discover|thank|welcome|receipt|order|table|server|guest|www\.|\.com/i;
  const taxRe = /\btax\b|hst|gst|pst|vat/i;
  const tipRe = /\btip\b|gratuity|service charge/i;

  for (const line of lines) {
    const m = line.match(priceRe);
    if (!m) continue;
    const price = parseFloat(m[1].replace(',', '.'));
    if (isNaN(price) || price < 0) continue;

    let name = line.slice(0, line.lastIndexOf(m[0])).trim()
      .replace(/^\d+x?\s*/i, '')   // strip leading qty like "2x" or "2 "
      .replace(/[\*\|\+]/g, '')
      .replace(/\s{2,}/g, ' ')
      .trim();

    if (!name || name.length < 2) continue;
    if (taxRe.test(name)) { tax = price; continue; }
    if (tipRe.test(name)) { tip = price; continue; }
    if (skipRe.test(name)) continue;
    if (/^\d+$/.test(name)) continue;

    // Modifiers starting with + are add-ons — fold into previous item's price
    if (/^\+/.test(line) && items.length > 0) {
      items[items.length - 1].price = parseFloat((items[items.length - 1].price + price).toFixed(2));
      items[items.length - 1].name += ` +${name.replace(/^\+/, '').trim()}`;
      continue;
    }

    items.push({ name: toTitleCase(name), price });
  }

  return { items, tax, tip };
}

function toTitleCase(s) {
  return s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

function applyReceiptData(data) {
  state.items = (data.items||[]).map((item, i) => ({
    id: 'item_'+Date.now()+'_'+i,
    name: item.name,
    price: parseFloat(item.price)||0,
    assignedTo: []
  }));
  state.tax = parseFloat(data.tax)||0;
  state.tip = parseFloat(data.tip)||0;
  document.getElementById('taxInput').value = state.tax > 0 ? state.tax.toFixed(2) : '';
  document.getElementById('tipInput').value = state.tip > 0 ? state.tip.toFixed(2) : '';
}

// ---- Screen 1: People ----
function renderPeople() {
  const list = document.getElementById('peopleList');
  list.innerHTML = '';
  state.people.forEach(p => {
    const div = document.createElement('div');
    div.className = 'person-tag';
    div.innerHTML = `<div class="person-color" style="background:${p.color}"></div>
      <span class="person-name">${escHtml(p.name)}</span>
      <button class="person-remove" data-id="${p.id}">×</button>`;
    list.appendChild(div);
  });
  list.querySelectorAll('.person-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      state.people = state.people.filter(p => p.id !== id);
      state.items.forEach(item => { item.assignedTo = item.assignedTo.filter(x => x !== id); });
      renderPeople();
      updatePeopleNext();
    });
  });
  updatePeopleNext();
}

function updatePeopleNext() {
  document.getElementById('toPeopleNextBtn').disabled = state.people.length < 2;
}

function addPerson() {
  const input = document.getElementById('personInput');
  const name = input.value.trim();
  if (!name) return;
  if (state.people.find(p => p.name.toLowerCase() === name.toLowerCase())) { input.value=''; return; }
  state.people.push({ id: 'p_'+Date.now(), name, color: COLORS[state.people.length % COLORS.length] });
  input.value = '';
  renderPeople();
}

document.getElementById('addPersonBtn').addEventListener('click', addPerson);
document.getElementById('personInput').addEventListener('keydown', e => { if(e.key==='Enter') addPerson(); });
document.getElementById('toPeopleNextBtn').addEventListener('click', () => goTo(2));

// ---- Screen 2: Assign ----
document.getElementById('taxInput').addEventListener('input', e => { state.tax = parseFloat(e.target.value)||0; });
document.getElementById('tipInput').addEventListener('input', e => { state.tip = parseFloat(e.target.value)||0; });

document.getElementById('toggleAddItem').addEventListener('click', () => {
  const form = document.getElementById('addItemForm');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
});

document.getElementById('addItemBtn').addEventListener('click', () => {
  const name = document.getElementById('newItemName').value.trim();
  const price = parseFloat(document.getElementById('newItemPrice').value)||0;
  if (!name || price <= 0) return;
  state.items.push({ id:'item_'+Date.now(), name, price, assignedTo:[] });
  document.getElementById('newItemName').value = '';
  document.getElementById('newItemPrice').value = '';
  renderItems();
});

function renderItems() {
  const list = document.getElementById('itemsList');
  list.innerHTML = '';
  if (state.items.length === 0) {
    list.innerHTML = '<p style="color:var(--text-muted);font-size:14px;text-align:center;padding:20px 0">No items yet — add one above</p>';
    return;
  }
  state.items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'item-card' + (item.assignedTo.length > 0 ? ' fully-assigned' : '');
    const chips = state.people.map(p => {
      const sel = item.assignedTo.includes(p.id);
      return `<div class="chip ${sel?'selected':''}" style="${sel?`background:${p.color};border-color:${p.color}`:''}" data-pid="${p.id}" data-iid="${item.id}">${escHtml(p.name)}</div>`;
    }).join('');
    const assignedLabel = item.assignedTo.length === 0
      ? '<span class="unassigned-badge">unassigned</span>'
      : `<span class="assigned-count">✓ ${item.assignedTo.length} person${item.assignedTo.length>1?'s':''}</span>`;
    card.innerHTML = `
      <div class="item-header">
        <span class="item-name">${escHtml(item.name)}</span>
        <span class="item-price">$${item.price.toFixed(2)}</span>
      </div>
      <div class="item-actions-row">
        <div class="assign-chips">${chips}</div>
        ${assignedLabel}
        <button class="item-remove-btn" data-iid="${item.id}">🗑</button>
      </div>`;
    list.appendChild(card);
  });
  // Chip toggle
  list.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const iid = chip.dataset.iid, pid = chip.dataset.pid;
      const item = state.items.find(i => i.id === iid);
      if (!item) return;
      if (item.assignedTo.includes(pid)) {
        item.assignedTo = item.assignedTo.filter(x => x !== pid);
      } else {
        item.assignedTo.push(pid);
      }
      renderItems();
    });
  });
  // Remove item
  list.querySelectorAll('.item-remove-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.items = state.items.filter(i => i.id !== btn.dataset.iid);
      renderItems();
    });
  });
}

document.getElementById('toSummaryBtn').addEventListener('click', () => goTo(3));

// ---- Screen 3: Summary ----
function renderSummary() {
  const subtotal = state.items.reduce((s,i) => s+i.price, 0);
  const grandTotal = subtotal + state.tax + state.tip;
  document.getElementById('grandTotal').textContent = '$' + grandTotal.toFixed(2);

  // Check unassigned
  const unassigned = state.items.filter(i => i.assignedTo.length === 0);
  document.getElementById('warningBar').style.display = unassigned.length > 0 ? 'block' : 'none';

  const cards = document.getElementById('summaryCards');
  cards.innerHTML = '';

  state.people.forEach(person => {
    // Items assigned to this person
    const myItems = state.items.filter(i => i.assignedTo.includes(person.id));
    // Each item cost = price / number of people sharing
    const itemsTotal = myItems.reduce((s, item) => s + item.price / item.assignedTo.length, 0);

    // Tax & tip proportional to their share of assigned subtotal
    const assignedSubtotal = state.items
      .filter(i => i.assignedTo.length > 0)
      .reduce((s,i) => s + i.price/i.assignedTo.length, 0);

    // This person's proportion of the assigned total
    // (people who get nothing still may owe tax/tip if all items unassigned — skip that edge case)
    const proportion = assignedSubtotal > 0 ? itemsTotal / assignedSubtotal : 0;
    const taxShare = state.tax * proportion;
    const tipShare = state.tip * proportion;
    const personTotal = itemsTotal + taxShare + tipShare;

    const card = document.createElement('div');
    card.className = 'summary-card';
    const itemRows = myItems.map(item => {
      const share = item.price / item.assignedTo.length;
      const label = item.assignedTo.length > 1 ? ` ÷${item.assignedTo.length}` : '';
      return `<div class="summary-item-row"><span>${escHtml(item.name)}${label}</span><span>$${share.toFixed(2)}</span></div>`;
    }).join('');

    card.innerHTML = `
      <div class="summary-card-header">
        <div class="summary-person">
          <div class="summary-dot" style="background:${person.color}"></div>
          <span class="summary-name">${escHtml(person.name)}</span>
        </div>
        <div class="summary-total">$${personTotal.toFixed(2)}</div>
      </div>
      <div class="summary-items">
        ${itemRows || '<div class="summary-item-row"><span style="font-style:italic">No items</span><span>$0.00</span></div>'}
        ${(taxShare > 0 || tipShare > 0) ? '<div class="summary-divider"></div>' : ''}
        ${taxShare > 0 ? `<div class="summary-item-row fee"><span>Tax share</span><span>$${taxShare.toFixed(2)}</span></div>` : ''}
        ${tipShare > 0 ? `<div class="summary-item-row fee"><span>Tip share</span><span>$${tipShare.toFixed(2)}</span></div>` : ''}
      </div>`;
    cards.appendChild(card);
  });
}

function resetAll() {
  state = { items: [], people: [], tax: 0, tip: 0 };
  document.getElementById('receiptText').value = '';
  document.getElementById('parseError').style.display = 'none';
  document.getElementById('scanError').style.display = 'none';
  document.getElementById('previewZone').style.display = 'none';
  document.getElementById('scanBtn').disabled = true;
  document.getElementById('scanBtn').textContent = 'Scan Receipt';
  document.getElementById('taxInput').value = '';
  document.getElementById('tipInput').value = '';
  document.getElementById('addItemForm').style.display = 'none';
  switchTab('photo');
  renderPeople();
  goTo(0);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
renderPeople();
</script>
